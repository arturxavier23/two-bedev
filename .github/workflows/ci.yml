name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # Job 1: Lint e Verificação de Código
  # ============================================
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar sintaxe JavaScript
        run: node --check server.js

  # ============================================
  # Job 2: Build e Teste do Docker
  # ============================================
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: two-bee-dev:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 3: Testes de Integração
  # ============================================
  integration:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meu_banco
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Aguardar PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Aguardando PostgreSQL..."
            sleep 2
          done

      - name: Testar conexão com o banco
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: meu_banco
        run: |
          timeout 10 node -e "
            const { Client } = require('pg');
            const client = new Client({
              host: process.env.DB_HOST,
              port: process.env.DB_PORT,
              user: process.env.DB_USER,
              password: process.env.DB_PASSWORD,
              database: process.env.DB_NAME
            });
            client.connect()
              .then(() => {
                console.log('✅ Conexão com PostgreSQL bem-sucedida!');
                return client.end();
              })
              .then(() => process.exit(0))
              .catch(err => {
                console.error('❌ Erro:', err.message);
                process.exit(1);
              });
          "

  # ============================================
  # Job 4: Relatório de Status
  # ============================================
  status:
    name: 📊 Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, build, integration]
    if: always()
    
    steps:
      - name: Verificar status dos jobs
        run: |
          echo "========================================"
          echo "📋 RELATÓRIO DO PIPELINE CI/CD"
          echo "========================================"
          echo "🔍 Lint:        ${{ needs.lint.result }}"
          echo "🐳 Build:       ${{ needs.build.result }}"
          echo "🧪 Integration: ${{ needs.integration.result }}"
          echo "========================================"
          
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ] && \
             [ "${{ needs.integration.result }}" == "success" ]; then
            echo "✅ Pipeline concluído com sucesso!"
            exit 0
          else
            echo "❌ Pipeline falhou em algum job."
            exit 1
          fi
